# Steam Hour Booster OpenRC service config

SBC_APP_DIR="/opt/steam-hour-booster"
SBC_USER="steambooster"
SBC_GROUP="steambooster"

SBC_LOG_FILE="/var/log/steam-hour-booster.log"
SBC_ERROR_LOG_FILE="/var/log/steam-hour-booster.err.log"

# Respawn policy (supervise-daemon)
SBC_RESPAWN_DELAY="5"
SBC_RESPAWN_MAX="10"
SBC_RESPAWN_PERIOD="60"
