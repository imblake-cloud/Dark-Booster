<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background gradient matching dark grey palette -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d1d23"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>
    <!-- D letter — silver metallic gradient matching logo-render.svg tones -->
    <linearGradient id="d-fill" x1="0.2" y1="0" x2="0.7" y2="1">
      <stop offset="0"   stop-color="#a8a6a6"/>
      <stop offset="0.38" stop-color="#7c7878"/>
      <stop offset="1"   stop-color="#3e3d3d"/>
    </linearGradient>
    <!-- Left-edge highlight on the vertical bar of D -->
    <linearGradient id="d-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c8c6c6"/>
      <stop offset="1" stop-color="#6a6868" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle inner-rim highlight for depth -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- Subtle violet top-border accent -->
  <rect x="9" y="0.75" width="14" height="0.75" rx="0.375" fill="#7c7cf8" opacity="0.65"/>

  <!-- D outer shape: left bar + right semicircle -->
  <path d="M7 7 H16.5 Q26 7 26 16 Q26 25 16.5 25 H7 Z" fill="url(#d-fill)"/>

  <!-- D inner cutout (creates the D opening) -->
  <path d="M10.5 10.5 H15.5 Q22.5 10.5 22.5 16 Q22.5 21.5 15.5 21.5 H10.5 Z" fill="url(#bg)"/>

  <!-- Left-edge highlight stripe (mimics the light-catching edge in logo-render) -->
  <rect x="7" y="7" width="1.2" height="18" rx="0.6" fill="url(#d-edge)" opacity="0.55"/>

  <!-- Top rim glow for depth -->
  <path d="M7 7 H16.5 Q20 7 23 9.5" stroke="url(#rim)" stroke-width="0.8" fill="none" opacity="0.6"/>
</svg>
